function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const originalText = event.target.innerText;
    event.target.innerText = "✅ Copied!";
    setTimeout(() => { event.target.innerText = originalText; }, 2000);
  });
}
